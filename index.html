<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>大也さんのAIチャット</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f0f8ff; }
    h1 { color: #0078d4; text-align: center; }
    #chat-box { background: white; border-radius: 10px; padding: 20px; height: 300px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #ddd; }
    .user-msg { background: #0078d4; color: white; padding: 8px 12px; border-radius: 10px; margin: 5px 0; text-align: right; }
    .ai-msg { background: #e9e9e9; padding: 8px 12px; border-radius: 10px; margin: 5px 0; }
    #input-area { display: flex; gap: 10px; }
    #user-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
    button { padding: 10px 20px; background: #0078d4; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    button:hover { background: #005a9e; }
  </style>
</head>
<body>
  <h1>🤖 AIチャット</h1>
  <p style="text-align:center">作成者：津田大也</p>
  <div id="chat-box"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="メッセージを入力..." />
    <button onclick="sendMessage()">送信</button>
  </div>
  <script>
    const API_KEY = 'AQ.Ab8RN6K6pHSRdneujzkxRV0NSsc95Ysji7KnDxH8Mg1fUV9Abw';
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const message = input.value.trim();
      if (!message) return;
      chatBox.innerHTML += `<div class="user-msg">${message}</div>`;
      input.value = '';
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
        });
        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;
        chatBox.innerHTML += `<div class="ai-msg">🤖 ${reply}</div>`;
      } catch (e) {
        chatBox.innerHTML += `<div class="ai-msg">❌ エラーが発生しました</div>`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
